[package]
name = "husk"
version = "0.1.0"
edition = "2024"
description = "A fast beancount file formatter with CJK support"
license = "MIT"

[lib]
name = "husk"
path = "src/lib.rs"

[[bin]]
name = "husk"
path = "src/cli/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
regex = "1"
unicode-width = "0.2"
glob = "0.3"

[features]
default = []
wasm = ["dep:wasm-bindgen"]
python = ["dep:pyo3"]

[dependencies.wasm-bindgen]
version = "0.2"
optional = true

[dependencies.pyo3]
version = "0.24"
optional = true
features = ["extension-module"]
